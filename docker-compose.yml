services:

  mlops-api-v1:
    build:
      context: .
      dockerfile: src/api/v1/Dockerfile 
    deploy:
      replicas: 3      
    expose:
      - "8001"
    healthcheck:
      #test: ["CMD", "curl", "-f", "http://localhost:8000/health"] Y A PAS CURL DONC ON EVITE
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 5s      # vérifie toutes les 5s
      timeout: 3s
      retries: 5        # considère healthy après 5 succès
      start_period: 30s # laisse 30s à l'API pour démarrer
  
  mlops-api-v2:
    build:
      context: .
      dockerfile: src/api/v2/Dockerfile 
    deploy:
      replicas: 1      
    expose:
      - "8002"
    healthcheck:
      #test: ["CMD", "curl", "-f", "http://localhost:8000/health"] Y A PAS CURL DONC ON EVITE
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 5s      # vérifie toutes les 5s
      timeout: 3s
      retries: 5        # considère healthy après 5 succès
      start_period: 30s # laisse 30s à l'API pour démarrer

  nginx:
    build:
      context: deployments/nginx/
      dockerfile: Dockerfile
    container_name: nginx_revproxy
    ports:
      - "8080:80"
      - "443:443"
      - "8081:8081"   # port stats interne
    volumes:
      - ./deployments/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deployments/nginx/certs/nginx.crt:/etc/nginx/certs/nginx.crt:ro
      - ./deployments/nginx/certs/nginx.key:/etc/nginx/certs/nginx.key:ro      
      - ./deployments/nginx/.htpasswd:/etc/nginx/.htpasswd:ro
    depends_on:
      mlops-api-v1:
        condition: service_healthy  # ← attend que l'API v1 soit healthy
      mlops-api-v2:
        condition: service_healthy  # ← attend que l'API v2 soit healthy
  
  nginx_exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: nginx_exporter
    ports:
      - "9113:9113"
    depends_on:
      - nginx
    environment:
      SCRAPE_URI: http://nginx:8081/nginx_status   # on passe par le port 8081 pour les stats - séparation des ports


  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus_server
    ports:
      - "9090:9090"
    volumes:
      - ./deployments/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - nginx

  grafana:
    image: grafana/grafana:latest
    container_name: grafana_dashboard
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin

volumes:
  prometheus_data:
  grafana_data: